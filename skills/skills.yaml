    icon: "🗄️"
    description: "查询癌症依赖图谱中的基因敲除数据"
    example: "帮我查询 DepMap 中 BRCA1 在乳腺癌细胞系的 Chronos 依赖分数，并列出最依赖的 5 个细胞系"

  - id: dhdna-profiler
