    category: "生物信息学"
    icon: "🌳"
    description: "Python 库，用于系统发育树的操控、可视化和综合分析"
    example: "帮我用 ETE 读取一个含 10 个哺乳动物 COI 基因的 Newick 树，标注自展支持率并导出 PNG"

  - id: exa-search
    name: "Exa 网络检索"
    category: "科研写作"
    icon: "🔍"
    description: "通过 Exa API 进行高质量语义网络搜索与网页内容提取"
    example: "帮我用 Exa 搜索 2023 年后关于「KRAS G12C 抑制剂临床试验」的网页与论文摘要"

  - id: experimental-design
    name: "实验设计"
    category: "数据分析"
    icon: "📊"
    description: "实验方案设计，涵盖分组策略、随机化与样本量计算"
    example: "帮我设计一个 2×3 析因实验：温度（25/37℃）× pH（6/7/8）优化脂肪酶活力，给出随机化与重复数建议"

  - id: exploratory-data-analysis
    name: "探索性数据分析"
    category: "数据分析"
    icon: "📊"
