    category: "平台集成"
    icon: "☁️"
    description: "DNAnexus基因组云平台集成工具集"
    example: "帮我列出 DNAnexus 当前项目中所有 FASTQ 文件，并筛选文件名含 EGFR 的样本"

  - id: docx
