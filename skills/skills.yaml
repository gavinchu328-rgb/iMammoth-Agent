# 猛犸智能体 · 技能广场定义
# example 填入对话框，用自然语言描述需求，由 OpenClaw 调度对应技能
# 提示词均含明确目标，便于安装技能后直接测试

skills:
  # ── AI4Drug / 原有技能 ─────────────────────────────────────
  - id: ai4drug_target_discovery
    name: "靶点发现"
    category: "AI4Drug"
    icon: "🎯"
    description: "根据疾病找出相关的药物靶点"
    example: "帮我找一下肺癌的药物靶点"

  - id: ai4drug_protein_acquisition
    name: "蛋白质获取"
    category: "AI4Drug"
    icon: "🧬"
    description: "获取并整理蛋白质三维结构"
    example: "帮我获取一下 EGFR 蛋白的三维结构信息"

  - id: ai4drug_pocket_prediction
    name: "口袋预测"
    category: "AI4Drug"
    icon: "📍"
    description: "预测蛋白上可能的药物结合口袋"
    example: "帮我预测 EGFR（PDB: 3W2S）上有哪些可能的结合口袋"

  - id: ai4drug_molecule_design
    name: "分子设计"
    category: "AI4Drug"
    icon: "💊"
    description: "针对结合口袋设计候选小分子"
    example: "针对 EGFR 的结合口袋，帮我设计一批候选小分子"

  - id: ai4drug_conformer_generation
    name: "3D构象生成"
    category: "AI4Drug"
    icon: "🌀"
    description: "为分子生成三维构象"
    example: "帮我给阿司匹林（SMILES: CC(=O)Oc1ccccc1C(=O)O）生成三维构象"

  - id: ai4drug_receptor_preparation
    name: "受体准备"
    category: "AI4Drug"
    icon: "🧪"
    description: "把蛋白结构整理成适合对接的形式"
    example: "帮我把 EGFR 蛋白结构（PDB: 3W2S）准备成可以做分子对接的受体"

  - id: ai4drug_ligand_preparation
    name: "配体准备"
    category: "AI4Drug"
    icon: "⚗️"
    description: "把小分子整理成适合对接的形式"
    example: "帮我把吉非替尼准备成可以做对接的配体"

  - id: ai4drug_docking_box_config
    name: "对接盒配置"
    category: "AI4Drug"
    icon: "📦"
    description: "按口袋设置对接搜索范围"
    example: "根据 EGFR 的 ATP 结合口袋，帮我设置分子对接的搜索盒子"

  - id: ai4drug_molecular_docking
    name: "分子对接"
    category: "AI4Drug"
    icon: "🔗"
    description: "把小分子对接到蛋白口袋并打分"
    example: "帮我把吉非替尼对接到 EGFR（PDB: 3W2S）上，并给出对接打分"

  - id: ai4drug_molecule_evaluation
    name: "ADMET评估"
    category: "AI4Drug"
    icon: "📊"
    description: "评估分子的吸收、代谢、毒性等性质"
    example: "帮我评估吉非替尼、奥希替尼、阿法替尼这 3 个分子的 ADMET 性质"

  - id: ai4drug_retrosynthesis
    name: "逆合成分析"
    category: "AI4Drug"
    icon: "🧭"
    description: "分析候选分子可能的合成路线"
    example: "帮我分析一下吉非替尼大概可以怎么合成"

  - id: ai4drug_full_pipeline
    name: "端到端药物发现"
    category: "AI4Drug"
    icon: "🚀"
    description: "从找靶点到合成分析跑完整流程"
    example: "帮我对非小细胞肺癌做一轮完整的药物发现，从找靶点一路做到候选分子评估和合成分析"

  # ── OpenClaw Workspace 技能 ───────────────────────────────
  - id: chemistry-calculation
    name: "化学计算"
    category: "化学信息学"
    icon: "⚗️"
    description: "分子性质、Lipinski、指纹、DFT、ADMET 等本地化学计算（chemistry-calc）"
    example: "咖啡因的口服生物利用度怎么样？它的极性表面积是多少？"

  - id: chemical_reaction
    name: "化学智能中心"
    category: "化学信息学"
    icon: "🔬"
    description: "huaxue AI 智能中心：性质预测、虚拟筛选、分子生成、反应预测、逆合成与催化剂推荐"
    example: "帮我预测乙醇与苯的反应产物，并给出阿司匹林的逆合成路线"

  - id: exp_design
    name: "智能实验设计"
    category: "实验设计"
    icon: "🧪"
    description: "基于文献和数据，生成完整实验方案"
    example: "帮我设计一个酶定向进化的完整实验方案"

  - id: protein_purify
    name: "蛋白质纯化实验"
    category: "实验设计"
    icon: "🧬"
    description: "设计完整的蛋白质纯化实验方案"
    example: "帮我设计一个 His-tag 蛋白的镍柱亲和纯化流程"

  - id: cell_culture
    name: "细胞培养流程"
    category: "实验设计"
    icon: "🧫"
    description: "设计细胞培养全流程"
    example: "帮我设计一个 HEK293 细胞的传代培养流程"

  - id: lit_to_exp
    name: "基于文献设计实验"
    category: "实验设计"
    icon: "🔗"
    description: "从文献出发设计实验方案"
    example: "基于最新 CRISPR 基因编辑文献，帮我设计验证实验"

  - id: lit_search
    name: "文献智能检索"
    category: "文献检索"
    icon: "🔍"
    description: "多源学术数据库检索与总结"
    example: "检索近五年关于 PD-1 免疫检查点抑制剂的综述文献"

  - id: enzyme_papers
    name: "酶工程论文检索"
    category: "文献检索"
    icon: "📚"
    description: "检索酶工程领域最新论文"
    example: "检索酶工程领域近两年的高引用论文并总结研究热点"

  - id: evolution_papers
    name: "定向进化文献"
    category: "文献检索"
    icon: "📖"
    description: "检索定向进化相关文献"
    example: "检索定向进化在工业酶改造中的应用文献"

  - id: true_science
    name: "真科学问题"
    category: "药物研发"
    icon: "🔬"
    description: "解答复杂科研问题"
    example: "T 细胞耗竭的分子机制是什么？有哪些逆转策略？"

  - id: catalyst_opt
    name: "催化剂合成优化"
    category: "工艺优化"
    icon: "⚡"
    description: "优化催化剂合成条件与产率"
    example: "优化钯催化 Suzuki 偶联反应的条件以提高产率"

  - id: data_analysis
    name: "实验结果分析"
    category: "数据分析"
    icon: "📊"
    description: "分析实验数据并给出结论"
    example: "帮我分析这组酶活性测定数据，判断最优反应条件"

  - id: supervisor
    name: "多智能体协作"
    category: "调度协作"
    icon: "🤖"
    description: "多 Agent 协同完成复杂任务"
    example: "协调文献检索和实验设计，完成一个完整的科研项目规划"

  - id: auto_lab
    name: "自动化实验执行"
    category: "调度协作"
    icon: "🏭"
    description: "自动化控制实验设备"
    example: "设计一个自动化移液流程，完成 96 孔板的样品制备"

  - id: safety_check
    name: "实验安全校验"
    category: "安全"
    icon: "🛡️"
    description: "评估实验安全风险"
    example: "评估使用浓硫酸和硝酸进行消解实验的安全风险和防护措施"

  # ── Scientific Agent Skills (K-Dense) ───────────────────────
  # 共 149 个；介绍与示例已中文化，且含明确可测目标
  - id: adaptyv
    name: "Adaptyv 蛋白质实验"
    category: "蛋白质工程"
    icon: "🧩"
    description: "云平台，自动提交蛋白质序列进行实验测试与功能验证"
    example: "帮我用 Adaptyv 提交 GFP 蛋白（UniProt: P42212）的热稳定性测试实验"

  - id: aeon
    name: "Aeon 时序机器学习"
    category: "机器学习"
    icon: "🤖"
    description: "兼容 scikit-learn 的时序机器学习 Python 工具包"
    example: "帮我用 aeon 对 UCR GunPoint 时序数据集做分类，并报告准确率"

  - id: anndata
    name: "AnnData 单细胞数据"
    category: "生物信息学"
    icon: "🧬"
    description: "处理标注矩阵的 Python 包，专为单细胞数据设计"
    example: "帮我用 AnnData 加载 pbmc3k 单细胞数据，统计细胞数、基因数和线粒体比例"

  - id: arbor
    name: "Arbor 假设树优化"
    category: "研究方法"
    icon: "🎓"
    description: "基于假设树精炼的自主优化方法，迭代改进分子设计"
    example: "帮我用 Arbor 优化阿司匹林类似物，目标是提高 LogP 同时保持分子量 < 300"

  - id: arboreto
    name: "Arboreto 基因调控网络"
    category: "生物信息学"
    icon: "🧬"
    description: "基于梯度提升的可扩展基因调控网络推断 Python 工具"
    example: "帮我用 Arboreto（GRNBoost2）从 pbmc3k 表达矩阵推断前 50 个转录因子调控关系"

  - id: astropy
    name: "Astropy 天文计算"
    category: "材料与物理"
    icon: "⚛️"
    description: "天文学与天体物理学综合 Python 库，提供核心分析功能"
    example: "帮我用 Astropy 计算 M31（赤经 0h42m44s，赤纬 +41°16′9″）到地球的距离模数"

  - id: autoskill
    name: "Autoskill 工作流挖掘"
    category: "基础设施"
    icon: "🔧"
    description: "监控屏幕检测重复科研流程，自动生成可复用工作流技能"
    example: "帮我把「每天从 CSV 生成柱状图并导出 PNG」这个重复流程整理成可复用技能草稿"

  - id: benchling-integration
    name: "Benchling 实验平台"
    category: "平台集成"
    icon: "🔌"
    description: "接入 Benchling R&D 平台的工具，程序化操作实验数据"
    example: "帮我从 Benchling 列出项目中名为 EGFR_cloning 的 DNA 序列实体及其最新版本"

  - id: bgpt-paper-search
    name: "BGPT 论文检索"
    category: "科研写作"
    icon: "📚"
    description: "搜索学术论文，从全文提取结构化的实验数据与方法细节"
    example: "帮我用 BGPT 检索「osimertinib resistance EGFR」相关论文，并提取方法学与样本量字段"

  - id: bids
    name: "BIDS 脑影像标准"
    category: "神经科学"
    icon: "🧠"
    description: "脑影像数据标准（BIDS），规范神经科学数据的组织与描述"
    example: "帮我检查一个含 T1w 与 task-rest_bold 的 fMRI 目录是否符合 BIDS，并列出缺漏文件"

  - id: biopython
    name: "BioPython 生物信息"
    category: "生物信息学"
    icon: "🧬"
    description: "计算生物学与生物信息学 Python 库，覆盖序列到结构分析"
    example: "帮我用 BioPython 从 NCBI 下载 EGFR 基因（Gene ID: 1956）的 CDS FASTA 并统计 GC 含量"

  - id: bioservices
    name: "BioServices 生物数据库"
    category: "生物信息学"
    icon: "🧬"
    description: "统一编程访问 40+ 生物网络服务与数据库的 Python 库"
    example: "帮我用 BioServices 查询 UniProt P00533（EGFR）的功能注释、结构域和相关疾病"

  - id: bulk-rnaseq
    name: "Bulk RNA-seq 分析"
    category: "生物信息学"
    icon: "🧬"
    description: "批量 RNA-seq 差异表达研究全流程编排工具"
    example: "帮我设计从 FASTQ 到差异表达的 bulk RNA-seq 流程：对照 vs 吉非替尼处理的 A549 细胞，各 3 个重复"

  - id: cellxgene-census
    name: "CELLxGENE 单细胞库"
    category: "生物信息学"
    icon: "🧬"
    description: "查询与分析公开版本化单细胞和空间转录组数据的 Python 包"
    example: "帮我从 CELLxGENE Census 查询人类肺组织中标注为 epithelial cell 的细胞数量（最新 LTS）"

  - id: cirq
    name: "Cirq 量子计算"
    category: "机器学习"
    icon: "🤖"
    description: "Google 量子计算框架，用于设计、模拟和运行量子电路"
    example: "帮我用 Cirq 搭建 2 量子比特 Bell 态电路，并在模拟器上采样 1000 次输出概率分布"

  - id: citation-management
    name: "文献引用管理"
    category: "科研写作"
    icon: "📚"
    description: "学术文献管理：搜索、格式化引用、管理参考文献"
    example: "帮我生成 Nature 格式引用：DOI 10.1038/s41586-020-2649-2（AlphaFold 论文）"

  - id: clinical-decision-support
    name: "临床决策支持"
    category: "临床研究"
    icon: "🏥"
    description: "生成专业临床决策支持(CDS)文档"
    example: "65 岁心房颤动患者同时服用华法林与阿司匹林，帮我评估出血风险与用药建议"

  - id: clinical-reports
    name: "临床报告生成"
    category: "临床研究"
    icon: "🏥"
    description: "按规范撰写临床报告，覆盖病例报告等"
    example: "帮我写一份 58 岁男性急性前壁心梗（ST 段抬高）入院初诊病历摘要"

  - id: cobrapy
    name: "COBRApy 代谢建模"
    category: "材料与物理"
    icon: "⚛️"
    description: "基于约束的代谢网络重建与分析工具"
    example: "帮我用 COBRApy 加载 e_coli_core 模型，计算葡萄糖为唯一碳源时的最大生长速率"

  - id: consciousness-council
    name: "意识委员会思辨"
    category: "研究方法"
    icon: "🎓"
    description: "多视角思维审议，从不同立场讨论问题"
    example: "帮我从神经科学、哲学、工程三个视角讨论「大语言模型是否具有意识」并给出争议点"

  - id: dask
    name: "Dask 并行计算"
    category: "数据分析"
    icon: "📊"
    description: "大规模pandas/NumPy并行分布式计算"
    example: "帮我用 Dask 并行读取 10 个各 500MB 的 CSV（列含 timestamp,value），按小时聚合均值"

  - id: database-lookup
    name: "科学数据库查询"
    category: "科学数据库"
    icon: "🗄️"
    description: "查询78个公共科学与生物医学数据库"
    example: "帮我查询 PDB 中 EGFR 激酶域结构 1M17 的分辨率、配体和实验方法"

  - id: datamol
